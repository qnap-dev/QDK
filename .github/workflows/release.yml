name: Build and Release

# Triggered when a tag is pushed (e.g. v2.5.0 or 2.5.0)
on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+*'

jobs:
  # ---------------------------------------------------------------
  # Job 1: Build .deb package for each target architecture
  # ---------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64, armhf]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Strip leading 'v' from the tag so dch gets a clean semver (e.g. 2.5.0)
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      # The builder image is Ubuntu 18.04 + cross-compilation toolchains.
      # Using 18.04 pins the resulting binary against glibc 2.27,
      # which is compatible with a wider range of target systems.
      - name: Build Docker builder image
        run: docker build -t qdk-debuilder -f Dockerfile.debuilder .

      - name: Build .deb package for ${{ matrix.arch }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/qdk" \
            -w /qdk \
            -e DEBEMAIL="qdk@qnap.com" \
            -e DEBFULLNAME="QNAP QDK" \
            qdk-debuilder \
            sh -c "make -f Makefile.debian ARCH=${{ matrix.arch }} VERSION=${{ steps.version.outputs.VERSION }}"

      - name: Locate built .deb file
        id: deb
        run: |
          DEB_PATH=$(find debuild/ -maxdepth 1 -name "*.deb" | head -1)
          if [ -z "$DEB_PATH" ]; then
            echo "ERROR: No .deb file found in debuild/" >&2
            exit 1
          fi
          echo "path=$DEB_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DEB_PATH")" >> "$GITHUB_OUTPUT"
          echo "Built: $(basename "$DEB_PATH")"

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: ${{ steps.deb.outputs.path }}
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Job 2: Collect all .deb files and create a GitHub Release
  # ---------------------------------------------------------------
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - name: Download all .deb artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs/
          merge-multiple: true   # flatten all deb-* artifacts into debs/

      - name: List release assets
        run: ls -lh debs/

      - name: Create GitHub Release and upload .deb files
        uses: softprops/action-gh-release@v2
        with:
          name: "QDK ${{ github.ref_name }}"
          files: debs/*.deb
          generate_release_notes: true
